<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小城故事 | Tiny Story: Qingfeng Town</title>
    <!-- 引入视觉系字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-container">
        <!-- 顶部功能触发区 -->
        <div class="action-triggers">
            <button id="phone-trigger" title="系统菜单">
                <span class="menu-bar"></span>
                <span class="menu-bar"></span>
                <span class="menu-bar"></span>
            </button>
            <button id="message-trigger" title="手机简讯">
                <svg class="msg-icon-svg" width="24" height="32" viewBox="0 0 24 32" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="2" width="20" height="28" rx="4" stroke="#4a3c2b" stroke-width="2.5" />
                    <rect x="5" y="5" width="14" height="18" rx="1" fill="#4a3c2b" fill-opacity="0.2" />
                    <circle cx="12" cy="26" r="1.5" fill="#4a3c2b" />
                </svg>
                <span id="msg-badge-main" class="badge-dot hidden"></span>
            </button>
        </div>

        <!-- 场景舞台层 (Stage Layer) -->
        <main id="game-stage">
            <div id="bg-layer" class="viewport-bg"></div>
            <!-- 物件叠加层 (Narrative Items Layer) -->
            <div id="item-overlay" class="hidden">
                <img id="item-layer" src="">
            </div>
            <!-- 环境叙事层 (Ambient Context) -->
            <div id="ambient-narrative" class="hidden">
                <p class="ambient-text"></p>
            </div>


            <!-- 剧情选项层 (Central Interaction Overlay) -->
            <div id="plot-options"></div>

            <!-- 全局对话系统 (Cinematic Dialogue) -->
            <section id="dialogue-panel">
                <div class="dialogue-box">
                    <div class="speaker-aside">
                        <img id="speaker-avatar" src="" class="hidden">
                    </div>
                    <div class="dialogue-body">
                        <div class="control-strip">
                            <button class="ctrl-btn" title="快进">》》</button>
                            <button class="ctrl-btn" title="自动">Auto</button>
                            <button class="ctrl-btn" title="日志">Log</button>
                        </div>
                        <p class="plot-text">载入剧情中...</p>
                    </div>
                </div>
            </section>
        </main>



        <!-- 系统菜单叠加层 (System Menu Overlay) -->
        <div id="system-menu-overlay" class="sys-overlay hidden">
            <div class="sys-menu-card">
                <h2 class="sys-header">系统菜单</h2>
                <div class="sys-options" id="main-menu-options">
                    <button class="sys-btn" id="app-save">保存进度</button>
                    <button class="sys-btn" id="app-load">读取进度</button>
                    <button class="sys-btn" id="app-reset">重新开始</button>
                </div>

                <!-- 存档/读档槽位视图 -->
                <div class="sys-slot-view ui-mode-hide" id="sys-slot-view">
                    <h3 id="slot-view-title">选择槽位</h3>
                    <div class="slot-list" id="slot-list">
                        <!-- 动态生成的 10 个槽位 -->
                    </div>
                    <button class="sys-btn-back" id="back-to-main">返回控制中心</button>
                </div>
                <button class="panel-close-btn">返回游戏</button>
            </div>
        </div>

        <!-- 手机/简讯独立模态框 (Phone Modal) -->
        <div id="phone-modal-overlay" class="sys-overlay hidden">
            <div class="phone-container">
                <div class="phone-screen">
                    <div class="phone-header">
                        <span class="phone-time">12:30</span>
                        <div class="phone-icons">
                            <svg class="icon-signal" width="18" height="12" viewBox="0 0 18 12" fill="currentColor">
                                <rect x="0" y="8" width="3" height="4" rx="1" />
                                <rect x="5" y="6" width="3" height="6" rx="1" />
                                <rect x="10" y="3" width="3" height="9" rx="1" />
                                <rect x="15" y="0" width="3" height="12" rx="1" />
                            </svg>
                            <svg class="icon-wifi" width="16" height="12" viewBox="0 0 16 12" fill="currentColor">
                                <path
                                    d="M8 12c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm4.2-4.2c2.3-2.3 2.3-6.1 0-8.5-2.3-2.3-6.1-2.3-8.5 0-2.3 2.3-2.3 6.1 0 8.5"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                            </svg>
                            <svg class="icon-battery" width="24" height="12" viewBox="0 0 24 12" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <rect x="0.5" y="0.5" width="20" height="11" rx="2.5" stroke="currentColor" />
                                <rect x="2.5" y="2.5" width="14" height="7" rx="1" fill="currentColor" />
                                <path d="M22 4c.8 0 1.5.7 1.5 1.5v1c0 .8-.7 1.5-1.5 1.5" stroke="currentColor"
                                    stroke-linecap="round" />
                            </svg>
                        </div>
                    </div>
                    <div class="phone-body">
                        <!-- 手机桌面 (Homescreen) -->
                        <div id="phone-homescreen" class="phone-homescreen-view">
                            <div class="app-grid-container">
                                <div class="app-icon-item" data-app="contacts">
                                    <div class="app-icon contacts"></div>
                                    <span class="app-label">联系人</span>
                                </div>
                                <div class="app-icon-item" data-app="notes">
                                    <div class="app-icon notes"></div>
                                    <span class="app-label">备忘录</span>
                                </div>
                                <div class="app-icon-item" data-app="settings">
                                    <div class="app-icon settings"></div>
                                    <span class="app-label">设置</span>
                                </div>
                                <div class="app-icon-item" data-app="find">
                                    <div class="app-icon find"></div>
                                    <span class="app-label">收纳</span>
                                </div>
                            </div>

                            <!-- 底部 Dock 栏 (iOS Style) -->
                            <div class="phone-dock">
                                <div class="app-icon-item" data-app="phone">
                                    <div class="app-icon phone"></div>
                                </div>
                                <div class="app-icon-item" data-app="messages">
                                    <div class="app-icon messages"></div>
                                </div>
                                <div class="app-icon-item" data-app="gallery">
                                    <div class="app-icon gallery"></div>
                                </div>
                                <div class="app-icon-item" data-app="map">
                                    <div class="app-icon map"></div>
                                </div>
                            </div>
                        </div>

                        <!-- 简讯App独立视图 (Messages App) -->
                        <div id="phone-app-messages" class="phone-app-view ui-mode-hide">
                            <h2 class="phone-app-title">简讯</h2>
                            <div id="phone-msg-list" class="phone-msg-list">
                                <!-- 简讯内容 -->
                            </div>
                        </div>

                        <!-- 联系人App独立视图 (Contacts App) -->
                        <div id="phone-app-contacts" class="phone-app-view ui-mode-hide">
                            <h2 class="phone-app-title">联系人</h2>
                            <div id="contacts-main-list" class="phone-contact-list">
                                <!-- 联系人内容 -->
                            </div>
                            
                            <!-- 联系人详情子视图 -->
                            <div id="contact-detail-view" class="contact-detail-panel ui-mode-hide">
                                <button class="contact-back-btn">← 返回列表</button>
                                <div class="contact-detail-header">
                                    <div class="contact-large-avatar"></div>
                                    <h3 class="contact-detail-name">姓名</h3>
                                    <p class="contact-detail-bio">简介加载中...</p>
                                </div>
                                <div class="contact-traits-section">
                                    <h4>性格与特质</h4>
                                    <div id="contact-traits-list" class="traits-grid">
                                        <!-- 性格标签 -->
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 备忘录App独立视图 (Notes App) -->
                        <div id="phone-app-notes" class="phone-app-view ui-mode-hide">
                            <h2 class="phone-app-title">备忘录</h2>
                            <div id="phone-notes-list" class="phone-notes-list">
                                <!-- 剧情线索记录 -->
                            </div>
                        </div>

                        <!-- 设置App独立视图 (Settings App) -->
                        <div id="phone-app-settings" class="phone-app-view ui-mode-hide">
                            <h2 class="phone-app-title">设置</h2>
                            <div class="settings-group">
                                <!-- 系统设置 -->
                            </div>
                        </div>

                        <!-- 物件App独立视图 (Items App) -->
                        <div id="phone-app-find" class="phone-app-view ui-mode-hide">
                            <h2 class="phone-app-title">物</h2>
                            <div id="phone-inventory-list" class="phone-inventory-list">
                                <!-- 物品列表内容 -->
                            </div>
                        </div>

                        <!-- 地图App独立视图 (Map App) -->
                        <div id="phone-app-map" class="phone-app-view ui-mode-hide">
                            <div id="map-world">
                                <div id="map-viewer">
                                    <img src="./assets/map.webp" alt="Qingfeng Map" id="map-img">
                                    <div id="map-pins-layer"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 现代手机 Home 指示条 (iPhone Style) -->
                    <div id="phone-home-bar" class="phone-home-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 全局覆盖层：颗粒感滤镜 & 存档提醒 -->
    <div class="grain-overlay"></div>
    </div>

    <script type="module" src="game.js"></script>
</body>

</html>
